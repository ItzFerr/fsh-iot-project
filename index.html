<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>FSH IoT Remote | MQTT</title>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>
<!-- MQTT.js untuk WebSocket -->
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<!-- Material Icons -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400&display=swap" rel="stylesheet"/>
<style>
    .toggle-dot { transition: transform 0.3s ease-in-out; }
    input:checked ~ .toggle-dot { transform: translateX(100%); }
    input:checked ~ .toggle-bg { background-color: #10b981 !important; }
    
    body.dark { background-color: #1e293b; color: #f1f5f9; }
    body.dark .bg-white { background-color: #1e293b !important; }
    body.dark .bg-slate-50 { background-color: #0f172a !important; }
    body.dark .toggle-bg { background-color: #475569; }
    .connection-status { transition: all 0.3s; }
</style>
</head>
<body class="bg-slate-50 p-4 min-h-screen">
<div class="max-w-4xl mx-auto">
    <!-- Header -->
    <div class="flex justify-between items-start mb-6">
        <div>
            <h1 class="text-4xl font-bold">FSH IoT Remote</h1>
            <div class="flex items-center gap-2 mt-2">
                <span class="text-sm" id="mqttStatus">MQTT: Connecting...</span>
                <span class="w-2 h-2 bg-yellow-500 rounded-full animate-pulse" id="statusLed"></span>
            </div>
            <div class="text-xs text-gray-500 mt-1">
                <span>ferdysmarthome.vercel.app</span>
            </div>
        </div>
        <button class="bg-white p-2 rounded-lg shadow" id="themeToggle">
            <span class="material-symbols-outlined" id="themeIcon">light_mode</span>
        </button>
    </div>

    <!-- Room Light Control -->
    <div class="bg-white rounded-2xl p-6 shadow-lg mb-6">
        <div class="flex justify-between items-start mb-4">
            <div>
                <h2 class="text-xl font-semibold">Room Light</h2>
                <p class="text-sm text-gray-500">Main Bedroom Lighting</p>
            </div>
            <div class="bg-orange-100 p-2 rounded-full">
                <svg class="w-6 h-6 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" stroke-width="2"/>
                </svg>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <label class="relative inline-block w-14 h-8">
                <input type="checkbox" class="opacity-0 w-0 h-0" id="lightToggle">
                <span class="toggle-bg absolute cursor-pointer inset-0 bg-gray-300 rounded-full transition-colors"></span>
                <span class="toggle-dot absolute left-1 top-1 w-6 h-6 bg-white rounded-full shadow"></span>
            </label>
            <span class="font-medium text-lg" id="lightStatus">Inactive</span>
        </div>
    </div>

    <!-- Sensor Data -->
    <div class="grid grid-cols-2 gap-4 mb-6">
        <div class="bg-white rounded-2xl p-4 shadow-lg">
            <div class="text-orange-600 mb-2">
                <span class="material-symbols-outlined text-3xl">thermostat</span>
            </div>
            <p class="text-sm text-gray-500">Temperature</p>
            <p class="text-2xl font-bold" id="temperature">--°C</p>
        </div>
        <div class="bg-white rounded-2xl p-4 shadow-lg">
            <div class="text-blue-600 mb-2">
                <span class="material-symbols-outlined text-3xl">water_drop</span>
            </div>
            <p class="text-sm text-gray-500">Humidity</p>
            <p class="text-2xl font-bold" id="humidity">--%</p>
        </div>
    </div>

    <!-- LCD Display Control -->
    <div class="bg-white rounded-2xl p-6 shadow-lg">
        <div class="mb-4">
            <h2 class="text-xl font-semibold">LCD Display</h2>
            <p class="text-sm text-gray-500">Select the content to display on the Oled LCD</p>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <button class="flex items-center justify-center gap-2 p-4 rounded-xl border-2 border-transparent bg-slate-50 hover:bg-slate-100 transition-all" id="btn-robot-eyes">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-width="2"/>
                    <path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" stroke-width="2"/>
                </svg>
                <span class="font-medium">Robot Eyes</span>
            </button>
            <button class="flex items-center justify-center gap-2 p-4 rounded-xl border-2 border-smart-accent bg-smart-accent/5" id="btn-temp-humidity">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" stroke-width="2"/>
                </svg>
                <span class="font-medium text-smart-accent">Temp & Humidity</span>
            </button>
        </div>
    </div>
</div>

<script>
    // ========== KONFIGURASI MQTT ==========
    const brokerUrl = 'wss://broker.hivemq.com:8884/mqtt';
    const clientId = 'webclient_' + Math.random().toString(36).substr(2, 9);
    
    const topics = {
        relay: 'ferdysmarthome/relay',
        status: 'ferdysmarthome/status',
        suhu: 'ferdysmarthome/suhu',
        humidity: 'ferdysmarthome/humidity',
        ping: 'ferdysmarthome/ping'
    };

    // ========== UI ELEMENTS ==========
    const mqttStatus = document.getElementById('mqttStatus');
    const statusLed = document.getElementById('statusLed');
    const lightToggle = document.getElementById('lightToggle');
    const lightStatus = document.getElementById('lightStatus');
    const temperature = document.getElementById('temperature');
    const humidity = document.getElementById('humidity');

    // ========== STATE (dari localStorage) ==========
    let currentState = {
        relay: localStorage.getItem('relayState') || 'OFF',
        suhu: localStorage.getItem('suhu') || '--',
        humidity: localStorage.getItem('humidity') || '--'
    };

    // Update UI dari localStorage
    function updateUIFromState() {
        lightStatus.textContent = currentState.relay;
        lightToggle.checked = (currentState.relay === 'ON');
        temperature.innerHTML = (currentState.suhu !== '--' ? currentState.suhu + '°C' : '--°C');
        humidity.innerHTML = (currentState.humidity !== '--' ? currentState.humidity + '%' : '--%');
    }
    updateUIFromState();

    // ========== KONEKSI MQTT ==========
    const options = {
        clientId: clientId,
        clean: true,
        reconnectPeriod: 3000,
        connectTimeout: 10000,
        keepalive: 30
    };

    console.log('Connecting to MQTT broker...');
    const client = mqtt.connect(brokerUrl, options);

    client.on('connect', () => {
        console.log('✅ Connected to MQTT');
        mqttStatus.textContent = 'MQTT: Connected';
        mqttStatus.className = 'text-sm text-green-600';
        statusLed.className = 'w-2 h-2 bg-green-500 rounded-full animate-pulse';
        
        // Subscribe ke semua topic
        client.subscribe(topics.status);
        client.subscribe(topics.suhu);
        client.subscribe(topics.humidity);
        
        // Request status terbaru
        client.publish(topics.ping, 'status_request');
    });

    client.on('reconnect', () => {
        console.log('Reconnecting...');
        mqttStatus.textContent = 'MQTT: Reconnecting';
        mqttStatus.className = 'text-sm text-yellow-600';
        statusLed.className = 'w-2 h-2 bg-yellow-500 rounded-full animate-pulse';
    });

    client.on('close', () => {
        console.log('Disconnected');
        mqttStatus.textContent = 'MQTT: Disconnected';
        mqttStatus.className = 'text-sm text-red-600';
        statusLed.className = 'w-2 h-2 bg-red-500 rounded-full animate-pulse';
    });

    // ========== HANDLE INCOMING MESSAGES ==========
    client.on('message', (topic, message) => {
        const msg = message.toString();
        console.log('📩 Received:', topic, msg);
        
        if (topic === topics.status) {
            currentState.relay = msg;
            localStorage.setItem('relayState', msg);
            lightStatus.textContent = msg;
            lightToggle.checked = (msg === 'ON');
        }
        else if (topic === topics.suhu) {
            currentState.suhu = msg;
            localStorage.setItem('suhu', msg);
            temperature.innerHTML = msg + '°C';
        }
        else if (topic === topics.humidity) {
            currentState.humidity = msg;
            localStorage.setItem('humidity', msg);
            humidity.innerHTML = msg + '%';
        }
    });

    // ========== SEND RELAY COMMAND ==========
    lightToggle.addEventListener('change', (e) => {
        const newState = e.target.checked ? 'ON' : 'OFF';
        
        // Optimistic update
        lightStatus.textContent = newState;
        currentState.relay = newState;
        localStorage.setItem('relayState', newState);
        
        // Kirim ke MQTT
        client.publish(topics.relay, newState);
        console.log('📤 Sent:', topics.relay, newState);
    });

    // ========== DARK MODE ==========
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = document.getElementById('themeIcon');
    
    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark');
        themeIcon.textContent = 'dark_mode';
    }
    
    themeToggle.addEventListener('click', () => {
        document.body.classList.toggle('dark');
        const isDark = document.body.classList.contains('dark');
        themeIcon.textContent = isDark ? 'dark_mode' : 'light_mode';
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });

    // ========== LCD MODE SELECTOR ==========
    const btnRobot = document.getElementById('btn-robot-eyes');
    const btnData = document.getElementById('btn-temp-humidity');
    const spanRobot = btnRobot.querySelector('span');
    const spanData = btnData.querySelector('span');
    
    const unselectedClasses = ['border-transparent', 'bg-slate-50', 'hover:bg-slate-100'];
    const selectedClasses = ['border-smart-accent', 'bg-smart-accent/5', 'hover:bg-smart-accent/10'];

    btnRobot.addEventListener('click', () => {
        btnRobot.classList.remove(...unselectedClasses);
        btnRobot.classList.add(...selectedClasses);
        spanRobot.classList.add('text-smart-accent');
        spanRobot.classList.remove('text-slate-700');

        btnData.classList.remove(...selectedClasses);
        btnData.classList.add(...unselectedClasses);
        spanData.classList.remove('text-smart-accent');
        spanData.classList.add('text-slate-700');
    });

    btnData.addEventListener('click', () => {
        btnData.classList.remove(...unselectedClasses);
        btnData.classList.add(...selectedClasses);
        spanData.classList.add('text-smart-accent');
        spanData.classList.remove('text-slate-700');

        btnRobot.classList.remove(...selectedClasses);
        btnRobot.classList.add(...unselectedClasses);
        spanRobot.classList.remove('text-smart-accent');
        spanRobot.classList.add('text-slate-700');
    });

    // ========== PERIODIC CHECK ==========
    setInterval(() => {
        if (client.connected) {
            client.publish(topics.ping, 'status_request');
        }
    }, 30000);
</script>
</body>
</html>
